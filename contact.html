<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - &lt;AudeArtGalerie/&gt;</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav>
    <a href="presentation.html">Accueil</a>
    <a href="galerie.html">Galerie</a>
    <a href="panier.html">Panier</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="container py-5">
    <h1 class="mb-4">Contactez-moi ✉️</h1>

    <!-- Infos de contact -->
    <div class="mb-4">
      <p>Email : <a href="mailto:audeartgalerie@gmail.com">audeartgalerie@gmail.com</a></p>
      <p>Instagram : <a href="https://www.instagram.com/aude_art_galerie/" target="_blank">@aude_art_galerie</a></p>
    </div>

    <!-- Formulaire de contact -->
    <form id="contact-form" class="mb-5">
      <div class="mb-3">
        <label for="name" class="form-label">Nom</label>
        <input type="text" class="form-control" id="name" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label for="message" class="form-label">Message</label>
        <textarea class="form-control" id="message" rows="4" required></textarea>
      </div>
      <button type="submit" class="btn btn-dark">Envoyer</button>
    </form>

    <!-- Zone des commentaires -->
    <h2>Commentaires récents</h2>
    <div id="comments-container"></div>
  </div>

  <footer class="text-center py-3">
    &copy; 2026 &lt;AudeArtGalerie/&gt; - Tous droits réservés
  </footer>

  <script>
    // --------------------------
    // Gestion des commentaires avec mot de passe pour suppression
    // --------------------------
    const form = document.getElementById("contact-form");
    const container = document.getElementById("comments-container");
    const adminPassword = "aude1234"; // change ici ton mot de passe secret

    // Afficher les commentaires depuis localStorage
    function displayComments() {
      const comments = JSON.parse(localStorage.getItem("comments")) || [];
      container.innerHTML = "";
      comments.forEach((c, i) => {
        const div = document.createElement("div");
        div.classList.add("border", "p-3", "mb-3", "rounded");
        div.innerHTML = `
          <strong>${c.name}</strong> (${c.email})<br>
          <p>${c.message}</p>
          <button class="btn btn-sm btn-danger" onclick="removeComment(${i})">Supprimer</button>
        `;
        container.appendChild(div);
      });
    }

    // Supprimer un commentaire avec mot de passe
    function removeComment(index) {
      const password = prompt("🔑 Mot de passe administrateur pour supprimer ?");
      if (password !== adminPassword) {
        alert("❌ Mot de passe incorrect !");
        return;
      }
      let comments = JSON.parse(localStorage.getItem("comments")) || [];
      comments.splice(index, 1);
      localStorage.setItem("comments", JSON.stringify(comments));
      displayComments();
    }

    // Envoyer un commentaire
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const comments = JSON.parse(localStorage.getItem("comments")) || [];
      const newComment = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
      };
      comments.push(newComment);
      localStorage.setItem("comments", JSON.stringify(comments));
      form.reset();
      displayComments();
      alert("✅ Message envoyé !");
    });

    // Affichage initial
    document.addEventListener("DOMContentLoaded", displayComments);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
